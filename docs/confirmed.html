<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — CareKin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #f0f0f0;
    }

    header .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1E6FD9;
      letter-spacing: -0.3px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
    }

    .check-circle {
      width: 80px;
      height: 80px;
      background: #E8F5E9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 40px;
      line-height: 1;
    }

    h1 {
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }

    .body-text {
      font-size: clamp(15px, 2vw, 17px);
      color: #555;
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto 36px;
    }

    .open-button {
      display: inline-block;
      background: #1E6FD9;
      color: #fff;
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 24px;
    }

    .open-button:hover {
      background: #1558b0;
      transform: translateY(-1px);
    }

    .download-note {
      font-size: 13px;
      color: #888;
    }

    .download-note a {
      color: #1E6FD9;
      text-decoration: none;
    }

    .download-note a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 24px 32px;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #888;
    }

    footer a { color: #1E6FD9; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    footer .links {
      margin-bottom: 8px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">CareKin</div>
  </header>

  <main>
    <div class="check-circle">✅</div>

    <h1>Email Confirmed!</h1>
    <p class="body-text">
      Your CareKin account has been verified.
      Open the CareKin app on your Android device to get started.
    </p>

    <a class="open-button" href="carekin://home">Open CareKin</a>

    <p class="download-note">
      Don't have the app yet?
      <a
        href="https://play.google.com/store/apps/details?id=com.valorg.carekin"
        target="_blank"
        rel="noopener noreferrer"
      >Download it on Google Play</a>
    </p>
  </main>

  <footer>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
    <div>&copy; 2026 Valorg Apps. All rights reserved.</div>
  </footer>

</body>
</html>
